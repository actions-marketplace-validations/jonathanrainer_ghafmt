name: Filter Array Sorting

on:
  pull_request:
    branches: [develop, feature/*, main]
    paths:
      - '*.json'
      - 'src/**'
      - 'tests/**'
    types: [opened, reopened, synchronize]
  push:
    branches: [develop, main]
    tags:
      - 'v1.*'
      - 'v2.*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - run: echo "hello"
