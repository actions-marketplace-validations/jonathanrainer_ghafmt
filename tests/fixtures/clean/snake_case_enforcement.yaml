name: Snake Case Enforcement

on:
  workflow_dispatch:
    inputs:
      deploy_target:
        description: Where to deploy
        type: string
      dry_run:
        type: boolean
        default: false
      log_level:
        type: choice
        default: info
        options:
          - debug
          - info
          - warn

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      build_artifact: ${{ steps.run_build.outputs.artifact-path }}
      image_tag: ${{ steps.tag_and_push.outputs.image-tag }}
    steps:
      - uses: actions/checkout@v4

      - id: setup_node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Compile
        id: run_build
        run: |
          npm ci
          npm run build

      - name: Tag image
        id: tag_and_push
        run: echo "image-tag=latest" >> "$GITHUB_OUTPUT"

  deploy:
    needs: build
    if: ${{ inputs.dry_run == false }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to ${{ inputs.deploy_target }}
        id: run_deploy
        run: ./deploy.sh --target "${{ inputs.deploy_target }}" --log-level "${{ inputs.log_level }}"
