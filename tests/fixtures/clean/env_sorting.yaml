name: Env Sorting

on: push

env:
  A_SECRET: xyz
  Z_TOKEN: abc

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: node:20
      env:
        CI: true
        NODE_ENV: test
    env:
      CI: true
      FORCE_COLOR: '1'
      NODE_ENV: test
    steps:
      - run: echo test
        env:
          ALPHA: a
          ZEBRA: z
