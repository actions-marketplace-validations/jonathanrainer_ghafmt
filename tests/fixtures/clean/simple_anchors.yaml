name: Simple Anchors

on: push

env:
  NODE_VERSION: &node_ver '20'
  RUST_VERSION: &rust_ver '1.82'

jobs:
  test_node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: *node_ver

      - run: npm test

  test_rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: *rust_ver

      - run: cargo test
