name: Multi Job Deps

on:
  push:
    branches: [main]

jobs:
  publish:
    needs: [e2e, integration]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - run: npm publish

  e2e:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - run: npx playwright test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - run: npm ci && npm run build

  integration:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        shard: [1, 2, 3]
    steps:
      - uses: actions/checkout@v4

      - run: npm test -- --shard=${{ matrix.shard }}
