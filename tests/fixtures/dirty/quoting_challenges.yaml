name: Quoting Challenges
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BOOL_TRUE: "true"
      BOOL_FALSE: "false"
      BOOL_YES: "yes"
      BOOL_NO: "no"
      BOOL_ON: "on"
      BOOL_OFF: "off"
      NUMERIC_STR: "123"
      FLOAT_STR: "1.5"
      NULL_STR: "null"
      EMPTY_STR: ""
      COLON_VAL: "key: value"
      HASH_VAL: "not a # comment"
      BRACKET_VAL: "[not, a, list]"
      BRACE_VAL: "{not: a_map}"
    steps:
      - name: Expressions in various positions
        uses: actions/checkout@v4
        if: ${{ github.event_name == 'push' && contains(github.ref, 'refs/heads/') }}
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: ${{ github.event_name == 'pull_request' && 1 || 0 }}
      - name: Single-quoted values
        run: echo 'hello world'
        env:
          SINGLE: 'value with "double quotes" inside'
