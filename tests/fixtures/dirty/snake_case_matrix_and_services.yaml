name: Snake Case Matrix and Services
on: push
jobs:
  test:
    strategy:
      matrix:
        node-version: ['18', '20']
        operatingSystem: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.operatingSystem }}
    services:
      test-db:
        image: postgres:15
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: echo ${{ matrix.operatingSystem }}
